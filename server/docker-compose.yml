version: "3.8"

services:
  sametime-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sametime-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - sametime-data:/app/data
    environment:
      - SAMETIME_HOST=0.0.0.0
      - SAMETIME_PORT=8080
      - DATABASE_URL=sqlite:./data/sametime.db?mode=rwc
      - UPLOAD_DIR=./data/uploads
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - MAX_FILE_SIZE=10737418240
      - JWT_EXPIRY_HOURS=168
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sametime-data:
    driver: local