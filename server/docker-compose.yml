services:
  sametime-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sametime-server
    restart: unless-stopped
    ports:
      - "${SAMETIME_PORT:-9527}:${SAMETIME_PORT:-9527}"
    volumes:
      - sametime-data:/app/data
    env_file:
      - .env
    environment:
      - SAMETIME_HOST=0.0.0.0
      - DATABASE_URL=sqlite:./data/sametime.db?mode=rwc
      - UPLOAD_DIR=./data/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SAMETIME_PORT:-9527}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sametime-data:
    driver: local